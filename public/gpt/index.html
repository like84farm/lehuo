<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f97316">
  <title>GPT 聊天助手</title>
  <link rel="stylesheet" href="/gpt/style.css">
</head>
<body>
  <main class="gpt-app">
    <nav class="tool-nav" aria-label="工具导航">
      <a href="/">专属工具箱</a>
      <a href="/copywriter/">AI写文案</a>
      <a class="active" href="/gpt/">GPT</a>
    </nav>

    <section id="loginView" class="login-panel hidden">
      <p class="eyebrow">乐活互动 · GPT</p>
      <h1>GPT 聊天助手</h1>
      <p class="muted">输入访问密码后开始对话，聊天记录会保存在当前浏览器。</p>
      <form id="loginForm" class="login-form">
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="访问密码" required>
        <button type="submit">登录</button>
      </form>
      <p id="loginError" class="error"></p>
    </section>

    <section id="chatApp" class="chat-shell hidden">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          <div>
            <p class="eyebrow">GPT</p>
            <h1>聊天记录</h1>
          </div>
          <button id="closeSidebarButton" class="icon-button mobile-only" type="button" aria-label="关闭侧边栏">×</button>
        </div>

        <button id="newChatButton" class="new-chat" type="button">+ 新对话</button>
        <input id="searchInput" class="search-input" type="search" placeholder="搜索聊天记录">
        <div id="sessionList" class="session-list"></div>

        <div class="sidebar-actions">
          <button id="deleteChatButton" class="ghost" type="button">删除当前对话</button>
          <button id="logoutButton" class="ghost" type="button">退出登录</button>
        </div>
      </aside>

      <section class="chat-main">
        <header class="chat-topbar">
          <button id="openSidebarButton" class="icon-button mobile-only" type="button" aria-label="打开侧边栏">☰</button>
          <div>
            <p class="eyebrow">乐活互动 · 独立工具</p>
            <h2 id="chatTitle">新的对话</h2>
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="composerForm" class="composer">
          <textarea id="promptInput" rows="1" placeholder="输入问题，按 Enter 发送，Shift + Enter 换行"></textarea>
          <button id="sendButton" type="submit">发送</button>
        </form>
      </section>
    </section>
  </main>

  <script src="/gpt/script.js"></script>
</body>
</html>
