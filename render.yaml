services:
  - type: web
    name: image2-generator
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: APP_PASSWORD
        value: sam
      - key: IMAGE_API_BASE_URL
        value: https://llmhub.ltd/v1
      - key: IMAGE_MODEL
        value: gpt-image-2
      - key: SESSION_SECRET
        generateValue: true
      - key: IMAGE_API_KEY
        sync: false
      - key: COPYWRITER_API_BASE_URL
        value: https://api.deepseek.com/v1
      - key: COPYWRITER_MODEL
        value: deepseek-chat
      - key: COPYWRITER_API_KEY
        sync: false
      - key: GPT_API_BASE_URL
        value: https://llmhub.ltd/v1
      - key: GPT_MODEL
        value: gpt-5.5
      - key: GPT_MAX_TOKENS
        value: 4000
      - key: GPT_TEMPERATURE
        value: 0.7
      - key: GPT_API_KEY
        sync: false
